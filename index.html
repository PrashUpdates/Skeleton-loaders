<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Skeleton Loaders</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>Skeleton Loaders</h1>

<p>
A collection of 5 modern HTML & CSS loading placeholders.
</p>

<div class="loader-grid">
  
  <div class="loader-box netflix">

<h2>1. Netflix</h2>

<div class="skeleton netflix-card">

<div class="poster"></div>

<div class="content">

<div class="title"></div>

<div class="line"></div>

<div class="line short"></div>

</div>

</div>

</div>

<div class="loader-box youtube">

<h2>2. YouTube</h2>

<div class="skeleton youtube-card">

<div class="thumbnail"></div>

<div class="video-info">

<div class="avatar"></div>

<div class="text">

<div class="title"></div>

<div class="line short"></div>

</div>

</div>

</div>

</div>

<div class="loader-box amazon">

<h2>3. Amazon</h2>

<div class="skeleton amazon-card">

<div class="product-image"></div>

<div class="title"></div>

<div class="price"></div>

<div class="button"></div>

</div>

</div>

<div class="loader-box social">

<h2>4. Social Post</h2>

<div class="skeleton social-card">

<div class="top">

<div class="avatar"></div>

<div class="user">

<div class="title"></div>

<div class="line short"></div>

</div>

</div>

<div class="post-image"></div>

<div class="line"></div>

<div class="line short"></div>

</div>

</div>

<div class="loader-box article">

<h2>5. Medium Article</h2>

<div class="skeleton article-card">

<div class="heading"></div>

<div class="line"></div>

<div class="line"></div>

<div class="line"></div>

<div class="line short"></div>

</div>

</div>

</div>

<footer>

Simple • Clean • Responsive

</footer>

</div>

</body>

</html>
